<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>在线中国象棋</title>
<style>
  body { font-family: sans-serif; text-align: center; }
  #board { display: grid; grid-template-columns: repeat(9, 60px); gap: 0; margin: 20px auto; }
  .cell { width: 60px; height: 60px; border: 1px solid #333; line-height: 60px; font-size: 24px; cursor: pointer; user-select: none; }
  #info { margin-bottom: 10px; font-weight: bold; }
  #undoBtn { margin-bottom: 10px; }
</style>
</head>
<body>
<h1>在线中国象棋</h1>
<div id="info">轮到: <span id="turnText">红方</span></div>
<input id="roomInput" placeholder="房间号" style="margin-bottom:10px;">
<button id="joinBtn">加入房间</button>
<button id="undoBtn">悔棋</button>
<div id="board"></div>

<script>
const boardDiv = document.getElementById("board");
const turnText = document.getElementById("turnText");
const undoBtn = document.getElementById("undoBtn");
const roomInput = document.getElementById("roomInput");
const joinBtn = document.getElementById("joinBtn");

let databaseURLBase = "https://chinese1-1e222-default-rtdb.asia-southeast1.firebasedatabase.app/games";
let room = "room1";
let databaseURL = `${databaseURLBase}/${room}.json`;

const ROWS=10, COLS=9;
let board=[], turn="red", selected=null, history=[];
const pieces={ rK:'帥', rA:'仕', rE:'相', rH:'馬', rR:'車', rC:'炮', rP:'兵', bK:'將', bA:'士', bE:'象', bH:'馬', bR:'車', bC:'炮', bP:'卒' };

function initBoard(){
  board = Array.from({length: ROWS},()=>Array(COLS).fill(""));
  board[9] = ['rR','rH','rE','rA','rK','rA','rE','rH','rR'];
  board[7][1]='rC'; board[7][7]='rC';
  board[6][0]='rP'; board[6][2]='rP'; board[6][4]='rP'; board[6][6]='rP'; board[6][8]='rP';
  board[0] = ['bR','bH','bE','bA','bK','bA','bE','bH','bR'];
  board[2][1]='bC'; board[2][7]='bC';
  board[3][0]='bP'; board[3][2]='bP'; board[3][4]='bP'; board[3][6]='bP'; board[3][8]='bP';
}

function renderBoard(){
  boardDiv.innerHTML="";
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=document.createElement("div");
      cell.className="cell";
      cell.dataset.r=r; cell.dataset.c=c;
      const p=board[r][c];
      cell.innerText=p?pieces[p]:"";
      cell.style.color=p && p[0]==='r'?'red':'black';
      cell.addEventListener('click',cellClick);
      boardDiv.appendChild(cell);
    }
  }
  turnText.innerText = turn==="red"?"红方":"黑方";
}

function legalMove(from,to){
  if(!from||!to) return false;
  const piece=board[from.r][from.c], target=board[to.r][to.c];
  if(!piece) return false;
  const color=piece[0];
  if(target && target[0]===color) return false;
  const type=piece[1];
  const dr=to.r-from.r, dc=to.c-from.c;
  switch(type){
    case 'R': return dr===0||dc===0;
    case 'H': return (Math.abs(dr)===2&&Math.abs(dc)===1)||(Math.abs(dr)===1&&Math.abs(dc)===2);
    case 'C':
      if(dr===0||dc===0){
        let count=0;
        if(dr===0){for(let i=Math.min(from.c,to.c)+1;i<Math.max(from.c,to.c);i++) if(board[from.r][i]!=='') count++;} 
        else {for(let i=Math.min(from.r,to.r)+1;i<Math.max(from.r,to.r);i++) if(board[i][from.c]!=='') count++;}
        if(target==='') return count===0; else return count===1;
      }
      return false;
    case 'E':
      if(Math.abs(dr)===2 && Math.abs(dc)===2){
        let mr=(from.r+to.r)/2, mc=(from.c+to.c)/2;
        if(board[mr][mc]==='') return true;
      }
      return false;
    case 'A':
      if(Math.abs(dr)===1&&Math.abs(dc)===1){
        if(color==='r'&&to.r>=7&&to.r<=9&&to.c>=3&&to.c<=5) return true;
        if(color==='b'&&to.r>=0&&to.r<=2&&to.c>=3&&to.c<=5) return true;
      }
      return false;
    case 'K':
      if(Math.abs(dr)+Math.abs(dc)===1){
        if(color==='r'&&to.r>=7&&to.r<=9&&to.c>=3&&to.c<=5) return true;
        if(color==='b'&&to.r>=0&&to.r<=2&&to.c>=3&&to.c<=5) return true;
      }
      return false;
    case 'P':
      if(color==='r'){if(from.r>4) return dr===-1&&dc===0; else return (dr===-1&&dc===0)||(dr===0&&Math.abs(dc)===1);}
      else {if(from.r<5) return dr===1&&dc===0; else return (dr===1&&dc===0)||(dr===0&&Math.abs(dc)===1);}
  }
  return false;
}

function cellClick(e){
  const r=parseInt(e.target.dataset.r), c=parseInt(e.target.dataset.c);
  const piece=board[r][c];
  if(selected){
    if(legalMove(selected,{r,c})){
      history.push({from:{...selected},to:{r,c},piece:board[selected.r][selected.c],captured:board[r][c]});
      board[r][c]=board[selected.r][selected.c]; board[selected.r][selected.c]='';
      selected=null; turn = turn==='red'?'black':'red'; updateDatabase(); renderBoard();
    } else if(piece && ((piece[0]==='r' && turn==='red') || (piece[0]==='b' && turn==='black'))){
      selected={r,c};
    } else selected=null;
  } else {
    if(piece && ((piece[0]==='r' && turn==='red') || (piece[0]==='b' && turn==='black'))){
      selected={r,c};
    }
  }
}

undoBtn.addEventListener('click',()=>{
  if(history.length===0) return;
  const last=history.pop();
  board[last.from.r][last.from.c]=last.piece;
  board[last.to.r][last.to.c]=last.captured;
  turn = turn==='red'?'black':'red';
  updateDatabase();
  renderBoard();
});

joinBtn.addEventListener('click',()=>{
  if(roomInput.value.trim()==="") return;
  room = roomInput.value.trim();
  databaseURL = `${databaseURLBase}/${room}.json`;
  fetchDatabase();
});

async function updateDatabase(){
  await fetch(databaseURL,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({board, turn, history})
  });
}

async function fetchDatabase(){
  try{
    const resp = await fetch(databaseURL);
    const data = await resp.json();
    if(data){
      board = data.board||board;
      turn = data.turn||turn;
      history = data.history||history;
      renderBoard();
    }
  } catch(e){ console.log(e) }
}

setInterval(fetchDatabase,1000);

initBoard(); renderBoard();
</script>
</body>
</html>
